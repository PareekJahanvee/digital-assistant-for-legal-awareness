<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>KYR Search Results</title>
    <style>
        body { font-family: Arial, sans-serif; background: #fafafa; margin: 20px; }
        .article { background: white; padding: 20px; border-radius: 10px; margin-bottom: 15px; box-shadow: 0 0 5px rgba(0,0,0,0.1); }
        mark { background: yellow; }
        a { text-decoration: none; color: #0078D7; }
    </style>
</head>
<body>
    <h2>Search Results for "<b>{{ query }}</b>"</h2>
    {% if results %}
        {% for r in results %}
            <div class="article">
                <h3>{{ r.title }}</h3>
                <p>{{ r.text | safe }}</p>
            </div>
        {% endfor %}
    {% else %}
        <p>No results found.</p>
    {% endif %}
    <a href="/">🔍 New Search</a>
</body>
</html>
