<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Uploaded Documents</title>
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{
    background:#111;
    color:#eee;
    font-family:"Times New Roman",Times,serif;
}

h2{
    text-align:center;
    margin:1.5rem 0;
}

.table-wrapper{
    max-width:900px;
    margin:auto;
    background:#222;
    padding:1.5rem;
    border-radius:12px;
    border:1px solid #444;
}

table{
    width:100%;
    border-collapse:collapse;
}

th,td{
    padding:10px;
    text-align:left;
}

th{
    color:#bbb;
    border-bottom:1px solid #444;
}

tr{
    border-bottom:1px solid #333;
}

a.action{
    color:#6ab0ff;
    margin-right:10px;
}

a.action:hover{
    text-decoration:underline;
}

.back-btn{
    display:block;
    width:200px;
    margin:20px auto;
    text-align:center;
    padding:10px;
    background:#444;
    border-radius:6px;
}
</style>
</head>

<body>

<h2>Uploaded Documents</h2>

<div class="table-wrapper">
<table>

<tr>
<th>Title</th>
<th>Filename</th>
<th>Date</th>
<th>Actions</th>
</tr>

{% for doc in documents %}

<tr>
<td>{{ doc[1] }}</td>
<td>{{ doc[2] }}</td>
<td>{{ doc[3] }}</td>

<td>
<a class="action" href="/document/{{ doc[0] }}">View</a>
<a class="action" href="/delete/{{ doc[0] }}"
onclick="return confirm('Delete this document?');">Delete</a>
</td>
</tr>

{% endfor %}

</table>
</div>

<a href="/" class="back-btn">Back to Upload</a>

</body>
</html>
